kind = "web"
previewPath = "/"
title = "Pandit Devesh Darbhe - Vedic Pujari & Astrology"
version = "1.0.0"
id = "artifacts/pandit-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20280

[services.development]
run = "pnpm --filter @workspace/pandit-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pandit-website", "run", "build" ]
publicDir = "artifacts/pandit-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20280"
BASE_PATH = "/"
